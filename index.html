```html id="olymp2030"
<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Olympic Teams 2030</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');

body{
    margin:0;
    font-family:Inter, sans-serif;
    background: radial-gradient(circle at top, #0b1b3a, #050914);
    color:white;
    overflow:hidden;
}

/* GLASS CONTAINER */
.app{
    width:100%;
    max-width:420px;
    margin:auto;
    padding:20px;
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    gap:20px;
}

/* GLASS CARD */
.card{
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.15);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border-radius:24px;
    padding:20px;
    box-shadow:0 10px 40px rgba(0,0,0,0.4);
    text-align:center;
}

/* TITLE */
h1{
    font-size:28px;
    margin:0;
}

.subtitle{
    opacity:0.8;
    font-size:14px;
    margin-top:8px;
}

/* BUTTONS */
.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
}

button{
    padding:16px;
    border:none;
    border-radius:18px;
    font-size:15px;
    font-weight:600;
    cursor:pointer;
    color:#fff;
    background:rgba(255,255,255,0.1);
    border:1px solid rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    transition:0.25s;
}

button:active{
    transform:scale(0.96);
}

button:hover{
    background:rgba(255,255,255,0.18);
}

/* GOLD BUTTON */
.gold{
    background:linear-gradient(135deg,#FFD700,#FFB300);
    color:#1a1a1a;
    font-weight:800;
}

/* LOADING */
.loader{
    font-size:60px;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    from{transform:rotate(0);}
    to{transform:rotate(360deg);}
}

.fade{
    animation:fade 0.4s ease;
}

@keyframes fade{
    from{opacity:0; transform:scale(0.95);}
    to{opacity:1; transform:scale(1);}
}

/* TEAM CARD */
.team{
    font-size:60px;
    margin-bottom:10px;
}

.big{
    font-size:24px;
    font-weight:800;
}

/* COUNTER */
.counter{
    position:fixed;
    bottom:10px;
    right:10px;
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.15);
    backdrop-filter: blur(12px);
    padding:10px 14px;
    border-radius:16px;
    font-size:12px;
}
</style>
</head>

<body>

<div class="app">

<!-- SCREEN 1 -->
<div id="screen1" class="card fade">
    <h1>🏅 Olympic Draft</h1>
    <div class="subtitle">Оберіть свій вид спорту</div>

    <div class="grid" style="margin-top:20px;">
        <button onclick="pick()">⚽ Футбол</button>
        <button onclick="pick()">🏀 Баскетбол</button>
        <button onclick="pick()">🏊 Плавання</button>
        <button onclick="pick()">🏐 Волейбол</button>
        <button onclick="pick()">🏃 Біг</button>
        <button onclick="pick()">🚴 Велоспорт</button>
        <button onclick="pick()">🏓 Теніс</button>
        <button onclick="pick()">🏸 Бадмінтон</button>
    </div>
</div>

<!-- SCREEN 2 -->
<div id="loading" class="card" style="display:none;">
    <div class="loader">🏅</div>
    <div id="loadingText" style="margin-top:15px; opacity:0.8;">
        Аналіз...
    </div>
</div>

<!-- SCREEN 3 -->
<div id="result" class="card" style="display:none;">
    <div class="team" id="teamIcon"></div>
    <div class="big" id="teamName"></div>
    <div style="opacity:0.8; margin-top:10px;">
        Знайди свою команду 🔥
    </div>

    <button class="gold" style="margin-top:20px;" onclick="next()">
        Наступний учасник
    </button>
</div>

</div>

<div class="counter">
👤 <span id="p">1</span> |
🦅 <span id="e">0</span> |
🐆 <span id="p2">0</span>
</div>

<script>

let player = 1;
let eagles = 0;
let panthers = 0;

const texts = [
"Аналізуємо біометрію...",
"Завантаження олімпійського потенціалу...",
"Сканування спортивного ДНК...",
"Формуємо команду...",
"Майже готово..."
];

function pick(){

document.getElementById('screen1').style.display='none';
document.getElementById('loading').style.display='block';

document.getElementById('loadingText').innerText =
texts[Math.floor(Math.random()*texts.length)];

setTimeout(showTeam, 1500);
}

function showTeam(){

document.getElementById('loading').style.display='none';
document.getElementById('result').style.display='block';

let team;

if(eagles < panthers) team = "e";
else if(panthers < eagles) team = "p";
else team = Math.random() < 0.5 ? "e" : "p";

if(team === "e"){
eagles++;
document.getElementById("teamIcon").innerText = "🦅";
document.getElementById("teamName").innerText = "ОЛІМПІЙСЬКІ ОРЛИ";
}else{
panthers++;
document.getElementById("teamIcon").innerText = "🐆";
document.getElementById("teamName").innerText = "ОЛІМПІЙСЬКІ ПАНТЕРИ";
}

document.getElementById("e").innerText = eagles;
document.getElementById("p2").innerText = panthers;
}

function next(){

player++;
document.getElementById("p").innerText = player;

document.getElementById('result').style.display='none';
document.getElementById('screen1').style.display='block';
}

</script>

</body>
</html>
```
